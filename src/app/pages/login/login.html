<div class="min-h-screen flex">


  <!-- Côté gauche - Image -->
     <div class="hidden  lg:block lg:w-1/2 relative">
    <img
      src="images/first.jpg"
      alt="Bibliothèque"
      class="absolute  bg-green-50 inset-0 w-full h-full object-cover"
    />
   
  </div>
  

  <!-- Côté droit - Formulaire -->
  <div class="lg:w-1/2  justify-center items-center flex flex-col justify-center px-8 sm:px-16 lg:px-20">
    <div class="w-full  max-w-md">
      <!-- Logo -->
    

    <!-- Formulaire -->
    <div class="bg-white py-10 px-8 shadow-2xl rounded-3xl border border-green-100 relative overflow-hidden">

      <!-- Éléments décoratifs -->
      <div class="absolute -top-6 -left-6 h-32 w-32 rounded-full bg-gradient-to-r from-green-200 to-emerald-200 opacity-20 blur-2xl"></div>
      <div class="absolute -bottom-6 -right-6 h-32 w-32 rounded-full bg-gradient-to-r from-emerald-200 to-green-200 opacity-20 blur-2xl"></div>

      <div class="relative">
        <div class="mb-8">
          <h2 class="text-3xl font-bold text-gray-900 text-center mb-2">Bienvenue !</h2>
          <p class="text-gray-500 text-sm text-center">Connectez-vous à votre espace administrateur</p>
        </div>

        <!-- Erreur -->
        <div *ngIf="errorMsg" class="mb-6 p-4 text-sm font-medium text-red-800 bg-red-50 rounded-lg border border-red-200">
          {{ errorMsg }}
        </div>

        <div class="space-y-5">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Nom d'utilisateur</label>
            <input
              type="text"
              [(ngModel)]="username"
              (keyup.enter)="login()"
              placeholder="admin"
              class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all duration-200 text-sm"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
            <input
              type="password"
              [(ngModel)]="password"
              (keyup.enter)="login()"
              placeholder="••••••••"
              class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all duration-200 text-sm"
            />
          </div>

          <button
            (click)="login()"
            [disabled]="loading"
            class="w-full flex justify-center items-center py-3 px-4 rounded-lg text-sm font-semibold text-white bg-gradient-to-r from-emerald-600 to-green-600 hover:from-emerald-700 hover:to-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5">
            <span *ngIf="loading" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Connexion...
            </span>
            <span *ngIf="!loading">Se connecter</span>
          </button>

        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="mt-8 text-center text-sm text-gray-400">© 2026 Bibliothèque. Tous droits réservés.</p>
    </div>
  </div>

</div>
