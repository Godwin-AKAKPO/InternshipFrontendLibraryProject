<div class="min-h-screen bg-green-50 flex items-center justify-center p-6">
  <div class="bg-white border border-gray-200 rounded-2xl p-10 w-full max-w-md shadow-sm">

    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-green-600 text-white rounded-xl flex items-center justify-center font-bold text-xl mx-auto mb-4">B</div>
      <h1 class="text-xl font-bold text-gray-900">Bibliothèque</h1>
      <p class="text-sm text-gray-500 mt-1">Connectez-vous à votre espace admin</p>
    </div>

    <div *ngIf="errorMsg" class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-6">
      {{ errorMsg }}
    </div>

    <div class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">Nom d'utilisateur</label>
        <input
          type="text"
          [(ngModel)]="username"
          (keyup.enter)="login()"
          placeholder="admin"
          class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-900 outline-none focus:border-green-600 focus:ring-2 focus:ring-green-100 transition-all"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">Mot de passe</label>
        <input
          type="password"
          [(ngModel)]="password"
          (keyup.enter)="login()"
          placeholder="••••••••"
          class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-900 outline-none focus:border-green-600 focus:ring-2 focus:ring-green-100 transition-all"
        />
      </div>

      <button
        (click)="login()"
        [disabled]="loading"
        class="mt-2 py-2.5 bg-green-600 hover:bg-green-700 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold text-sm rounded-lg transition-colors">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </div>

  </div>
</div>
