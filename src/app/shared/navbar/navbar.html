            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">

          <div class="flex items-center justify-center w-8 h-8 bg-gradient-to-r from-emerald-500 to-green-500 text-white text-sm font-semibold rounded-full shadow-sm">
            {{ authService.getUsername().charAt(0).toUpperCase() }}
          </div>
          <div class="text-left">
            <div class="font-medium text-gray-900">{{ authService.getUsername() }}</div>
          </div>
          <svg class="h-4 w-4 text-gray-400 transition-transform" [class.rotate-180]="dropdownOpen"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />

          class="absolute right-0 top-12 bg-white border border-gray-200 rounded-xl shadow-lg w-48 z-50 py-1">
